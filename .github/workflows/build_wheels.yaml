name: Build wheels

on:
  # Manually trigger
  workflow_dispatch:
  # Or push a tag
  push:
    tags:
      - v*.*.*

env:
  CIBW_BUILD: "cp3*-*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-15, macos-15-intel]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Used to host cibuildwheel
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13' 

      - name: Install cibuildwheel
        run: python -m pip install "cibuildwheel>=3,<4"

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      # Upload result (one per platform)
      - uses: actions/upload-artifact@v4
        with:
          name: pyclothoid-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
